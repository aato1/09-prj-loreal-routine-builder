<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <div class="brand-block">
          <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
          <p class="site-title">Smart Routine &amp; Product Advisor</p>
        </div>

        <button
          id="directionToggle"
          type="button"
          class="direction-toggle"
          aria-label="Change page direction"
          title="Direction: Auto"
        >
          <span class="direction-toggle-label">Direction</span>
          <span class="direction-toggle-value">Auto</span>
        </button>

        <nav class="page-nav" aria-label="Page sections">
          <a href="#shop">Categories</a>
          <a href="#chatSection">Chat</a>
        </nav>
      </header>

      <!-- Category Filter -->
      <div id="shop" class="search-section">
        <select id="categoryFilter">
          <option value="" disabled selected>Choose a Category</option>
          <option value="cleanser">Cleansers</option>
          <option value="moisturizer">Moisturizers & Treatments</option>
          <option value="haircare">Haircare</option>
          <option value="makeup">Makeup</option>
          <option value="hair color">Hair Color</option>
          <option value="hair styling">Hair Styling</option>
          <option value="men's grooming">Men's Grooming</option>
          <option value="suncare">Suncare</option>
          <option value="fragrance">Fragrance</option>
        </select>

        <label for="productSearch" class="visually-hidden"
          >Search products</label
        >
        <input
          id="productSearch"
          class="product-search"
          type="search"
          placeholder="Search products or keywords"
          autocomplete="off"
        />

        <button
          type="button"
          class="hover-help"
          aria-label="Selection tip"
          data-tooltip="Tip: Click cards quickly to select. Product details appear only after hovering for about 1 second."
        >
          <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
        </button>
      </div>

      <!-- Products Grid -->
      <div id="productsContainer" class="products-grid"></div>

      <!-- Selected Products -->
      <div id="selectedSection" class="selected-products">
        <div class="selected-header">
          <h2>Selected Products</h2>
          <div class="selected-actions">
            <button
              type="button"
              class="hover-help selected-help"
              aria-label="Selected products tip"
              data-tooltip="Tip: Click to remove individual products."
            >
              <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
            </button>
            <button
              id="clearSelectedProducts"
              type="button"
              class="clear-selected-btn"
            >
              Clear All
            </button>
          </div>
        </div>
        <div id="selectedProductsList"></div>
        <button id="generateRoutine" class="generate-btn">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Routine
        </button>
      </div>

      <!------- Chat Area ------->
      <section id="chatSection" class="chatbox">
        <div class="chat-header">
          <h2>Let's Build Your Routine</h2>
          <div class="chat-actions">
            <button
              type="button"
              class="hover-help chat-help"
              aria-label="Conversation reset tip"
              data-tooltip="Tip: Reset conversation clears chat messages and follow-up memory so you can start fresh."
            >
              <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
            </button>
            <button
              id="resetConversation"
              type="button"
              class="clear-selected-btn"
            >
              Reset Conversation
            </button>
          </div>
        </div>
        <div id="chatWindow" class="chat-window"></div>

        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about products or routines…"
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i>
            <span class="visually-hidden">Send</span>
          </button>
        </form>
      </section>

      <!------- Footer Links ------->
      <footer id="footerSection" class="site-footer">
        <p>&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav>
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
